services:
  - type: web
    name: andrea-alkalay-art
    runtime: node
    plan: free
    repo: https://github.com/nicogomez94/arte
    branch: main
    buildCommand: npm ci --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: andrea-alkalay-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin

databases:
  - name: andrea-alkalay-db
    databaseName: andrea_alkalay
    user: andrea_alkalay
    plan: free
